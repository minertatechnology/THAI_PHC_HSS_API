---
# 10. PHC Management (Admin Console + API)
# phc-management.hss.moph.go.th
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thaiphc2-admin-console-prod-ingress
  namespace: aorsormor-system
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # tls:
  #   - hosts:
  #       - phc-management.hss.moph.go.th
  #     secretName: phc-management-hss-moph-tls
  rules:
    - host: phc-management.hss.moph.go.th
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: osm-thai-phc-hss-api-service
                port:
                  number: 80
          - path: /callback
            pathType: Prefix
            backend:
              service:
                name: osm-thai-phc-hss-api-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thaiphc2-admin-console-service
                port:
                  number: 80
