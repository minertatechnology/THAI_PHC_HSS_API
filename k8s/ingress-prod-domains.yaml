# =============================================================================
# API BACKENDS
# =============================================================================

---
# 6. Thai PHC HSS API
# api-thaiphc.hss.moph.go.th
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: osm-thai-phc-hss-api-prod-ingress
  namespace: aorsormor-system
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://thaiphc.hss.moph.go.th,https://phc-management.hss.moph.go.th,https://dashboard.hss.moph.go.th,https://phc-learning.hss.moph.go.th,https://genh.hss.moph.go.th,https://osm-workreport.hss.moph.go.th"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # tls:
  #   - hosts:
  #       - api-thaiphc.hss.moph.go.th
  #     secretName: api-thaiphc-hss-moph-tls
  rules:
    - host: api-thaiphc.hss.moph.go.th
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: osm-thai-phc-hss-api-service
                port:
                  number: 80

