# =============================================================================
# Production Domain Ingress — hss.moph.go.th
# Production domain ingress สำหรับ hss.moph.go.th
#
# kubectl -n aorsormor-system apply -f ingress-prod-domains.yaml
#
# หมายเหตุ TLS:
#   - ถ้า domain ผ่าน Cloudflare proxy → Cloudflare จัดการ TLS ให้
#   - ถ้า domain ชี้ตรงมา cluster → ต้องใส่ tls section + cert-manager
#   - ตัวอย่าง cert-manager annotation ใส่ไว้ให้แล้ว (comment ไว้ก่อน)
# =============================================================================

# =============================================================================
# WEB FRONTENDS
# =============================================================================

---
# 1. Thai PHC Web Admin
# thaiphc.hss.moph.go.th
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thai-phc-web-admin-prod-ingress
  namespace: aorsormor-system
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # tls:
  #   - hosts:
  #       - thaiphc.hss.moph.go.th
  #     secretName: thaiphc-hss-moph-tls
  rules:
    - host: thaiphc.hss.moph.go.th
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thai-phc-web-admin-service
                port:
                  number: 80

