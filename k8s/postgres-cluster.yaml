apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: aorsormor-pg
  namespace: aorsormor-system
spec:
  instances: 4
  bootstrap:
    initdb:
      database: aorsormor_db
      owner: "aorsormor-user"
      secret:
        name: "pass"
  # === PostgreSQL tuning for high concurrency (10,000+ users) ===
  postgresql:
    parameters:
      max_connections: "300"
      shared_buffers: "512MB"
      effective_cache_size: "1536MB"
      work_mem: "4MB"
      maintenance_work_mem: "128MB"
      # Connection handling
      idle_in_transaction_session_timeout: "30000"
      statement_timeout: "60000"
      # WAL / checkpoint
      wal_buffers: "16MB"
      checkpoint_completion_target: "0.9"
      # Logging slow queries (> 1 second)
      log_min_duration_statement: "1000"

  storage:
    size: "20Gi"
    storageClass: "do-block-storage"