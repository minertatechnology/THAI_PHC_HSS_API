# =============================================================================
# HPA Optimized - คำนวณจาก actual usage + เผื่อ peak ระดับประเทศ
# Cluster: 3 workers × (16 cores, 64Gi RAM) = 48 cores, 192Gi RAM
# Worst case ทุก service max พร้อมกัน: ~15 cores (31%), ~62Gi (32%) = ยังเหลือเยอะ
#
# การเปลี่ยนแปลงหลัก:
#   1. Memory target: 75% → 85% (ป้องกัน scale loop จาก memory ไม่คืน)
#   2. maxReplicas เพิ่มขึ้นตาม criticality (API=18-24, Web=10)
#   3. scaleUp ช้าลง: stabilize 120s, เพิ่มทีละ 2 pods
#   4. scaleDown ช้าลง: stabilize 600s, ลดทีละ 1 pod ทุก 5 นาที
#   5. ทุก HPA มี behavior section (เดิมบางตัวไม่มี)
#
# *** สำคัญ: ต้องอัพเดท Deployment resource requests ด้วย ***
#   - osm-api: memory request 768Mi → 1Gi, limit 1Gi → 1.5Gi
#   - osm-thai-phc-hss-api: memory request 512Mi → 768Mi
#   - yuwa-osm-web: memory request 128Mi → 192Mi
# =============================================================================

# =============================================================================
# osm-thai-phc-hss-api-hpa (API หลัก - ระบบ Thai PHC HSS)
# actual usage: ~394Mi mem, ~6m cpu per pod
# memory request เดิม 512Mi → HPA เห็น 77% (เกิน 75%!)
# แก้: เพิ่ม memory request เป็น 768Mi + target 85% → HPA เห็น ~51%
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: osm-thai-phc-hss-api-hpa
  namespace: aorsormor-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: osm-thai-phc-hss-api-deployment
  minReplicas: 3
  maxReplicas: 18
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      selectPolicy: Max
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 600
      selectPolicy: Min
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
---
