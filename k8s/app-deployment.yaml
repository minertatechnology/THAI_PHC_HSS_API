# ===================================================================
# PART 5: Deployment และ Service ของแอปพลิเคชัน
# ===================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osm-thai-phc-hss-api-deployment
  namespace: aorsormor-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: osm-thai-phc-hss-api
  template:
    metadata:
      labels:
        app: osm-thai-phc-hss-api
    spec:
      containers:
      - name: osm-thai-phc-hss-api
        image: registry.digitalocean.com/minerta-k8s/osm-thai-phc-hss-api:v2.88
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        # --- Connection URLs ---
        - name: DATABASE_URL
          value: "postgresql://user_app:$(POSTGRES_PASSWORD)@aorsormor-pg-rw:5432/aorsormor_db"
        - name: RABBITMQ_URL
          value: "amqp://user_app:$(RABBITMQ_PASSWORD)@aorsormor-rabbitmq-headless:5672/"
        # --- ดึงค่าที่เป็นความลับจาก Secrets ---
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-db-secret
              key: POSTGRES_PASSWORD
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: RABBITMQ_PASSWORD
        # [แก้ไข] ดึง JWT_SECRET_KEY จาก Secret ที่ถูกต้อง
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: jwt-keys-secret
              key: JWT_SECRET_KEY
        - name: JWT_FIRST_LOGIN_TOKEN_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: jwt-keys-secret
              key: JWT_FIRST_LOGIN_TOKEN_SECRET_KEY
        - name: JWT_PRIVATE_KEY_INLINE
          valueFrom:
            secretKeyRef:
              name: jwt-keys-secret
              key: private_key.pem
        - name: JWT_PUBLIC_KEY_INLINE
          valueFrom:
            secretKeyRef:
              name: jwt-keys-secret
              key: public_key.pem
        envFrom:
        # --- ดึงค่า Config ทั่วไปทั้งหมดจาก ConfigMap ---
        - configMapRef:
            name: app-configmap
        volumeMounts:
        # --- นำไฟล์ Key จาก Secret ไปสร้างเป็นไฟล์ใน Container ---
        - name: jwt-keys-volume
          mountPath: "/app/keys"
          readOnly: true
      volumes:
      - name: jwt-keys-volume
        secret:
          secretName: jwt-keys-secret
---
apiVersion: v1
kind: Service
metadata:
  name: osm-thai-phc-hss-api-service
  namespace: aorsormor-system
spec:
  type: ClusterIP
  selector:
    app: osm-thai-phc-hss-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
