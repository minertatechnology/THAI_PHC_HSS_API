<title>รายงานผลการทดสอบประสิทธิภาพระบบ — Capacity Test Report</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,'Sarabun',sans-serif;background:#0f172a;color:#e2e8f0;line-height:1.6}
.header{background:linear-gradient(135deg,#1e293b,#334155);padding:24px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #3b82f6}
.header h1{font-size:20px;color:#f1f5f9}.header h1 span{color:#3b82f6}
.header-sub{font-size:13px;color:#94a3b8;margin-top:4px}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:.2s}
.btn-pdf{background:#3b82f6;color:#fff}.btn-pdf:hover{background:#2563eb}
.content{padding:24px 32px;max-width:1400px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.card{background:#1e293b;border-radius:12px;padding:16px 20px;border:1px solid #334155}
.card h3{font-size:11px;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.card-val{font-size:26px;font-weight:700}
.card-sub{font-size:11px;color:#64748b;margin-top:4px}
.chart-box{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155;margin-bottom:20px}
.chart-box h3{font-size:15px;margin-bottom:14px;color:#e2e8f0}
.chart-wrap{position:relative;height:300px}
.chart-wrap-sm{position:relative;height:250px}
.tbl-box{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155;margin-bottom:20px;overflow-x:auto}
.tbl-box h3{font-size:15px;margin-bottom:14px;color:#e2e8f0}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;background:#0f172a;color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{padding:8px 12px;border-top:1px solid #334155;font-size:13px}
tr:hover td{background:#334155}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-pass{background:#065f46;color:#6ee7b7}.b-fail{background:#7f1d1d;color:#fca5a5}.b-warn{background:#78350f;color:#fcd34d}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.dot-ok{background:#22c55e}.dot-warn{background:#eab308}.dot-fail{background:#ef4444}
.section-title{font-size:18px;font-weight:700;margin:32px 0 16px;color:#f1f5f9;padding-bottom:8px;border-bottom:2px solid #334155}
.section-desc{font-size:13px;color:#94a3b8;margin:-8px 0 16px;line-height:1.6}
.accent{color:#3b82f6}
.green{color:#22c55e}.yellow{color:#eab308}.red{color:#ef4444}
.info-box{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155;margin-bottom:20px;font-size:13px;color:#94a3b8;line-height:1.8}
.info-box h3{font-size:15px;margin-bottom:10px;color:#e2e8f0}
.info-box strong{color:#e2e8f0}
.status-big{font-size:48px;font-weight:800;text-align:center;padding:16px}
.status-pass{color:#22c55e}.status-fail{color:#ef4444}
.result-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.result-header .sys-badge{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:700;color:#fff}
.result-header .sys-badge.hss{background:#3b82f6}.result-header .sys-badge.osm{background:#8b5cf6}.result-header .sys-badge.elearn{background:#10b981}
.footer{text-align:center;padding:24px;color:#475569;font-size:12px;border-top:1px solid #334155;margin-top:32px}
#loading{display:none;position:fixed;inset:0;background:rgba(15,23,42,.9);z-index:9999;align-items:center;justify-content:center}
#loading.show{display:flex}
.spinner{width:36px;height:36px;border:4px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{body{background:#fff;color:#000}.header{background:#f1f5f9;border-color:#3b82f6}.card,.chart-box,.tbl-box,.info-box{border-color:#e2e8f0;background:#fff}th{background:#f1f5f9}.section-title{border-color:#e2e8f0}}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}.content{padding:16px}}
</style>
</head>

function fm(v){if(v==null)return'-';return v>=1000?(v/1000).toFixed(2)+'s':v.toFixed(1)+'ms'}
function fn(v){return v==null?'-':v.toLocaleString()}
function fp(v){return v==null?'-':(v*100).toFixed(2)+'%'}
function fb(v){if(v==null)return'-';if(v>1073741824)return(v/1073741824).toFixed(2)+' GB';if(v>1048576)return(v/1048576).toFixed(1)+' MB';return(v/1024).toFixed(0)+' KB'}
function errColor(r){return r>0.05?'#ef4444':r>0.01?'#eab308':'#22c55e'}
function errClass(r){return r>0.05?'b-fail':r>0.01?'b-warn':'b-pass'}
function pColor(v,limit){return v>limit?'#ef4444':v>limit*0.7?'#eab308':'#22c55e'}
function sysColor(s){
  const map = {hss:HSS_COLOR, osm:OSM_COLOR, yuwa:YUWA_COLOR, elearn:ELEARN_COLOR,
    web_dashboard:WEB_DASHBOARD_COLOR, web_learning:WEB_LEARNING_COLOR,
    web_workreport:WEB_WORKREPORT_COLOR, web_genh:WEB_GENH_COLOR};
  return map[s] || '#94a3b8';
}

    for(const tKey of sys.tests){

      const m = d.metrics;
      const dur = m.http_req_duration;
      const err = m.errors.rate;
      const allPass = d.endpoints.every(e=>e.pass);
      const overall = err < 0.1 && allPass;

      h += `<div class="result-header"><span class="sys-badge" style="background:${sys.color}">${fn(d.vus)} ผู้ใช้พร้อมกัน</span>
        <span style="font-size:16px;font-weight:700;color:${overall?'#22c55e':'#ef4444'}">${overall?'ผ่านเกณฑ์ทั้งหมด':'บางเกณฑ์ไม่ผ่าน'}</span></div>`;

      h += `<div class="grid">
        <div class="card"><h3>ผู้ใช้พร้อมกัน</h3><div class="card-val">${fn(d.vus)}</div><div class="card-sub">Virtual Users</div></div>
        <div class="card"><h3>รอบการใช้งาน</h3><div class="card-val">${fn(m.iterations.count)}</div><div class="card-sub">Iterations</div></div>
        <div class="card"><h3>คำขอทั้งหมด</h3><div class="card-val">${fn(m.http_reqs.count)}</div><div class="card-sub">${fn(m.http_reqs.rate)} คำขอ/วินาที</div></div>
        <div class="card"><h3>เวลาเฉลี่ย</h3><div class="card-val" style="color:${pColor(dur.avg,1000)}">${fm(dur.avg)}</div><div class="card-sub">P95: ${fm(dur['p(95)'])}</div></div>
        <div class="card"><h3>อัตราข้อผิดพลาด</h3><div class="card-val" style="color:${errColor(err)}">${fp(err)}</div><div class="card-sub">เกณฑ์: น้อยกว่า 10%</div></div>
        <div class="card"><h3>Checks ผ่าน</h3><div class="card-val" style="color:${m.checks.rate>=0.99?'#22c55e':'#eab308'}">${fp(m.checks.rate)}</div></div>
        <div class="card"><h3>ข้อมูลส่ง</h3><div class="card-val">${fb(m.data_sent)}</div></div>
        <div class="card"><h3>ข้อมูลรับ</h3><div class="card-val">${fb(m.data_received)}</div></div>
      </div>`;

      h += `<div class="grid-2">
        <div class="chart-box"><h3>เวลาตอบสนองแต่ละจุดบริการ</h3><div class="chart-wrap-sm"><canvas id="cEp_${tKey}"></canvas></div></div>
        <div class="chart-box"><h3>การกระจายเวลาตอบสนอง</h3><div class="chart-wrap-sm"><canvas id="cDist_${tKey}"></canvas></div></div>
      </div>`;

      h += `<div class="tbl-box"><h3>ผลการตรวจสอบแต่ละจุดบริการ</h3><table>
        <tr><th>กลุ่ม</th><th>รายการตรวจสอบ</th><th>สำเร็จ</th><th>ล้มเหลว</th><th>อัตราสำเร็จ</th><th>เกณฑ์ P95</th><th>ค่าจริง P95</th><th>สถานะ</th></tr>`;
      for(let i=0; i<d.checks.length; i++){
        const c = d.checks[i];
        const ep = d.endpoints[i] || {};
        const tot = c.passes + c.fails;
        const rate = tot > 0 ? c.passes / tot : 0;
        const rc = rate >= 0.99 ? 'b-pass' : rate >= 0.9 ? 'b-warn' : 'b-fail';
        h += `<tr>
          <td style="font-weight:600;color:${sys.color}">${c.group}</td>
          <td>${c.name}</td>
          <td>${fn(c.passes)}</td>
          <td>${c.fails>0?'<span style="color:#ef4444;font-weight:600">'+fn(c.fails)+'</span>':'<span style="color:#22c55e">0</span>'}</td>
          <td><span class="badge ${rc}">${fp(rate)}</span></td>
          <td style="color:#94a3b8">${ep.threshold||'-'}</td>
          <td style="font-weight:600;color:${ep.pass?'#22c55e':'#ef4444'}">${ep.p95!=null?fm(ep.p95):'-'}</td>
          <td>${ep.pass?'<span class="dot dot-ok"></span>ผ่าน':'<span class="dot dot-fail"></span>ไม่ผ่าน'}</td>
        </tr>`;
      }
      h += '</table></div>';
    }
    sectionNum++;
  }

  // =========================================================
  // ส่วนที่ 7: โครงสร้างพื้นฐานที่ใช้ทดสอบ
  // =========================================================
  h += `<h2 class="section-title">${sectionNum}. โครงสร้างพื้นฐานที่ใช้ทดสอบ</h2>`;
  h += `<div class="info-box"><h3>ข้อมูลเซิร์ฟเวอร์</h3>
    <table style="width:100%">
      <tr><th style="width:200px">รายการ</th><th>รายละเอียด</th></tr>
      <tr><td>Kubernetes Cluster</td><td>1 Master + 3 Worker Nodes (v1.30.14)</td></tr>
      <tr><td>Worker Nodes</td><td>CPU ใช้งาน 1-2%, Memory ใช้งาน 30-33%</td></tr>
      <tr><td>Database Server</td><td>PostgreSQL 16.13 + PgBouncer 1.22.0, RAM 128 GB, CPU ใช้งาน ~0%, Memory ใช้งาน ~10%</td></tr>
      <tr><td>Cache Server</td><td>Redis (ในระบบ Kubernetes)</td></tr>
      <tr><td>HSS API Pods</td><td>29 pods</td></tr>
      <tr><td>OSM API Pods</td><td>60 pods</td></tr>
      <tr><td>E-Learning API Pods</td><td>30 pods (gunicorn -w 4, memory limit 2Gi)</td></tr>
      <tr><td>Yuwa-OSM API Pods</td><td>28 pods (gunicorn -w 4, memory limit 2Gi)</td></tr>
      <tr><td>Website Pods (Next.js)</td><td>Dashboard: 3, Learning: 3, WorkReport: 3, GenH: 3 pods</td></tr>
      <tr><td>PgBouncer Pool</td><td>pool_mode=transaction, default_pool_size=250, max_db_connections=900</td></tr>
      <tr><td>PostgreSQL</td><td>max_connections=1000, shared_buffers=32GB, work_mem=32MB</td></tr>
    </table>
  </div>`;
  sectionNum++;

  // =========================================================
  // ส่วนที่ 8: ภาคผนวก — คำอธิบายศัพท์เทคนิค (ล่างสุด)
  // =========================================================
  h += `<h2 class="section-title">${sectionNum}. ภาคผนวก — คำอธิบายศัพท์เทคนิคและมาตรฐานที่ใช้ในการทดสอบ</h2>`;
  h += `<p class="section-desc">เพื่อให้ผู้อ่านที่มิใช่บุคลากรด้านเทคนิคสามารถทำความเข้าใจรายงานฉบับนี้ได้โดยง่าย จึงอธิบายคำศัพท์สำคัญดังต่อไปนี้</p>`;
  h += `<div class="info-box">
    <h3>1. Virtual Users (VUs) — ผู้ใช้งานจำลอง</h3>
    <p>หมายถึง จำนวนผู้ใช้งานที่ถูกจำลองขึ้นมาเพื่อเข้าใช้งานระบบ<strong>พร้อมกันในเวลาเดียวกัน</strong> เปรียบเสมือนสถานการณ์ที่มีประชาชนหรือ อสม. เปิดแอปพลิเคชันและใช้งานฟีเจอร์ต่างๆ ของระบบในเวลาเดียวกัน เช่น 5,000 VUs หมายถึง มีผู้ใช้งาน 5,000 คนกดใช้งานระบบพร้อมกัน</p>
    <br>
    <h3>2. P95 (Percentile 95) — เวลาตอบสนอง ณ เปอร์เซ็นไทล์ที่ 95</h3>
    <p>เป็นมาตรฐานสากลที่ใช้วัดประสิทธิภาพของระบบ โดยหมายความว่า <strong>95% ของคำขอทั้งหมดได้รับการตอบสนองภายในเวลาไม่เกินค่านี้</strong></p>
    <p>ตัวอย่างเช่น P95 = 240 ms หมายความว่า จากคำขอทั้งหมด 100 ครั้ง มีอย่างน้อย 95 ครั้งที่ระบบตอบสนองได้ภายใน 240 มิลลิวินาที (0.24 วินาที)</p>
    <p style="margin-top:8px"><strong>เหตุผลที่ใช้ P95:</strong> การใช้ค่าเฉลี่ย (Average) อย่างเดียวอาจทำให้เข้าใจผิดได้ เนื่องจากค่าเฉลี่ยสามารถถูกบิดเบือนโดยค่าที่สูงหรือต่ำผิดปกติเพียงไม่กี่ค่า การใช้ P95 จึงสะท้อนประสบการณ์จริงของผู้ใช้งานส่วนใหญ่ได้ดีกว่า และเป็นมาตรฐานที่หน่วยงานด้านเทคโนโลยีสารสนเทศทั่วโลกนิยมใช้</p>
    <br>
    <h3>3. Throughput (อัตราการประมวลผล) — คำขอต่อวินาที (req/s)</h3>
    <p>หมายถึง จำนวนคำขอ (Request) ที่ระบบสามารถรับและตอบสนองได้ภายใน 1 วินาที <strong>ยิ่งค่าสูงยิ่งดี</strong> เปรียบเสมือนจำนวนคนที่ช่องบริการสามารถให้บริการได้ต่อหน่วยเวลา เช่น 5,923 req/s หมายถึง ระบบสามารถรองรับการเรียกใช้บริการได้ 5,923 ครั้งในทุกๆ วินาที</p>
    <br>
    <h3>4. Error Rate (อัตราข้อผิดพลาด)</h3>
    <p>หมายถึง สัดส่วนของคำขอที่ระบบ<strong>ไม่สามารถตอบสนองได้สำเร็จ</strong>ต่อจำนวนคำขอทั้งหมด <strong>ยิ่งค่าต่ำยิ่งดี</strong> เช่น Error Rate 0.29% หมายความว่า จากคำขอ 10,000 ครั้ง มีเพียง 29 ครั้งที่ไม่สำเร็จ ซึ่งถือว่าอยู่ในเกณฑ์ดีมาก</p>
    <p style="margin-top:8px"><strong>เกณฑ์ที่ใช้:</strong> มาตรฐานทั่วไปกำหนดไว้ที่ Error Rate ไม่เกิน 1-5% สำหรับการทดสอบภาระงานสูง ในการทดสอบครั้งนี้กำหนดเกณฑ์ไว้ที่ <strong>น้อยกว่า 10%</strong> เพื่อรองรับสถานการณ์ที่มีผู้ใช้งานจำนวนมากพร้อมกันในระดับสูงสุด</p>
    <br>
    <h3>5. Checks (การตรวจสอบความถูกต้อง)</h3>
    <p>หมายถึง การตรวจสอบว่าระบบ<strong>ตอบกลับข้อมูลที่ถูกต้องหรือไม่</strong> ไม่ใช่แค่ตอบกลับเร็ว แต่ต้องตอบกลับสำเร็จ (HTTP Status 200) ด้วย เช่น Checks 99.71% หมายความว่า จากการตรวจสอบทั้งหมด มี 99.71% ที่ระบบตอบกลับสำเร็จ</p>
    <br>
    <h3>6. Endpoint (จุดให้บริการ)</h3>
    <p>หมายถึง แต่ละฟังก์ชันหรือบริการย่อยของระบบที่ผู้ใช้งานเรียกใช้ เช่น การเข้าสู่ระบบ (Auth) การดูแดชบอร์ด (Dashboard) การดูข้อมูลอ้างอิง (Lookups) เป็นต้น แต่ละจุดบริการมีเกณฑ์เวลาตอบสนองที่แตกต่างกันตามความซับซ้อนของการประมวลผล</p>
    <br>
    <h3>7. หน่วยเวลาที่ใช้ในรายงาน</h3>
    <p>&bull; <strong>ms (มิลลิวินาที)</strong> = 1 ใน 1,000 ของวินาที — เช่น 240 ms = 0.24 วินาที</p>
    <p>&bull; <strong>s (วินาที)</strong> = หน่วยเวลามาตรฐาน — เช่น 1.98s = 1.98 วินาที</p>
    <p style="margin-top:8px"><strong>เกณฑ์อ้างอิง:</strong> ตามหลักการออกแบบระบบสารสนเทศ ผู้ใช้งานทั่วไปจะรู้สึกว่าระบบตอบสนอง "ทันที" หากเวลาน้อยกว่า 100 ms, "รวดเร็ว" หากน้อยกว่า 1 วินาที และ "ยอมรับได้" หากน้อยกว่า 5 วินาที</p>
  </div>`;

  document.getElementById('mainContent').innerHTML = h;
  buildCharts();
}

function buildCharts(){
  const labels = TESTS.map(t=>{
    const d=DATA[t];const n={elearn:'E-Learn',yuwa:'Yuwa-OSM',web_dashboard:'Dashboard Web',web_learning:'Learning Web',web_workreport:'WorkReport Web',web_genh:'GenH Web'}[d.system]||d.system.toUpperCase();
    return n+' '+fn(d.vus/1000)+'k VUs';
  });
  const colors = TESTS.map(t=>sysColor(DATA[t].system)+(API_TESTS.includes(t)?'cc':''));
  const borders = TESTS.map(t=>sysColor(DATA[t].system));

  const cOpts = (unit, beginZero=true) => ({
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#94a3b8',font:{size:12}}}},
    scales:{
      x:{ticks:{color:'#94a3b8'},grid:{color:'#33415544'}},
      y:{beginAtZero:beginZero, ticks:{color:'#94a3b8',callback:v=>v+(unit?' '+unit:'')},grid:{color:'#33415544'}}
    }
  });

  // Throughput
  new Chart(document.getElementById('cThroughput'),{type:'bar',data:{labels,datasets:[{
    label:'คำขอ/วินาที',data:TESTS.map(t=>DATA[t].metrics.http_reqs.rate),
    backgroundColor:colors,borderColor:borders,borderWidth:1,borderRadius:6
  }]},options:cOpts('req/s')});

  // Error
  new Chart(document.getElementById('cError'),{type:'bar',data:{labels,datasets:[{
    label:'Error Rate %',data:TESTS.map(t=>DATA[t].metrics.errors.rate*100),
    backgroundColor:TESTS.map(t=>DATA[t].metrics.errors.rate>0.01?'#ef444499':'#22c55e99'),
    borderColor:TESTS.map(t=>DATA[t].metrics.errors.rate>0.01?'#ef4444':'#22c55e'),
    borderWidth:1,borderRadius:6
  }]},options:{...cOpts('%'),plugins:{legend:{display:false},annotation:{}}}});

  // P95
  new Chart(document.getElementById('cP95'),{type:'bar',data:{labels,datasets:[{
    label:'P95 เวลาตอบสนอง',data:TESTS.map(t=>DATA[t].metrics.http_req_duration['p(95)']),
    backgroundColor:colors,borderColor:borders,borderWidth:1,borderRadius:6
  }]},options:cOpts('ms')});

  // Total requests
  new Chart(document.getElementById('cReqs'),{type:'bar',data:{labels,datasets:[{
    label:'จำนวนคำขอ',data:TESTS.map(t=>DATA[t].metrics.http_reqs.count),
    backgroundColor:colors,borderColor:borders,borderWidth:1,borderRadius:6
  }]},options:cOpts('')});

  // Endpoint comparison chart (grouped)
  const allEndpoints = new Set();
  TESTS.forEach(t=>DATA[t].endpoints.forEach(e=>allEndpoints.add(e.label)));
  const epLabels = [...allEndpoints];
  const dsColors = TESTS.map(t=>sysColor(DATA[t].system)+(API_TESTS.includes(t)?'88':''));
  const dsBorders = TESTS.map(t=>sysColor(DATA[t].system));
  const dsLabels = labels;

  new Chart(document.getElementById('cEndpointCompare'),{type:'bar',data:{
    labels: epLabels,
    datasets: TESTS.map((t,i)=>({
      label: dsLabels[i],
      data: epLabels.map(l=>{const ep=DATA[t].endpoints.find(e=>e.label===l);return ep?ep.p95:null}),
      backgroundColor: dsColors[i], borderColor: dsBorders[i], borderWidth:1, borderRadius:4
    }))
  },options:cOpts('ms')});

  // Per-test endpoint and distribution charts
  for(const t of TESTS){
    const d = DATA[t];
    const sc = sysColor(d.system);

    // Endpoint P95 bar
    new Chart(document.getElementById('cEp_'+t),{type:'bar',data:{
      labels: d.endpoints.map(e=>e.label),
      datasets:[
        {label:'ค่าเฉลี่ย (avg)',data:d.endpoints.map(e=>e.avg),backgroundColor:sc+'66',borderColor:sc,borderWidth:1,borderRadius:4},
        {label:'P95',data:d.endpoints.map(e=>e.p95),backgroundColor:sc+'cc',borderColor:sc,borderWidth:1,borderRadius:4},
      ]
    },options:cOpts('ms')});

    // Distribution
    const dur = d.metrics.http_req_duration;
    new Chart(document.getElementById('cDist_'+t),{type:'bar',data:{
      labels:['Min','ค่าเฉลี่ย','ค่ากลาง','P90','P95','สูงสุด'],
      datasets:[{label:'ms',data:[dur.min||0,dur.avg,dur.med,dur['p(90)'],dur['p(95)'],dur.max],
        backgroundColor:['#22c55e99','#3b82f699','#06b6d499','#eab30899','#f59e0b99','#ef444499'],
        borderColor:['#22c55e','#3b82f6','#06b6d4','#eab308','#f59e0b','#ef4444'],
        borderWidth:1,borderRadius:4}]
    },options:{...cOpts('ms'),plugins:{legend:{display:false}}}});
  }
}

async function generatePdf(){
  const el=document.getElementById('loading');el.classList.add('show');
  try{
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF('l','mm','a4');
    const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight(),m=8;
    const content=document.getElementById('report');
    const canvas=await html2canvas(content,{backgroundColor:'#0f172a',scale:2,useCORS:true,logging:false,windowWidth:content.scrollWidth,windowHeight:content.scrollHeight});
    const imgW=pw-m*2;const scale=imgW/canvas.width;const sliceH=Math.floor((ph-14)/scale);
    let srcY=0;let first=true;
    while(srcY<canvas.height){
      if(!first)pdf.addPage('a4','l');first=false;
      const h=Math.min(sliceH,canvas.height-srcY);
      const sc=document.createElement('canvas');sc.width=canvas.width;sc.height=h;
      sc.getContext('2d').drawImage(canvas,0,srcY,canvas.width,h,0,0,canvas.width,h);
      pdf.addImage(sc.toDataURL('image/jpeg',0.92),'JPEG',m,6,imgW,h*scale);
      srcY+=h;
    }
    pdf.save('capacity-test-report-hss-osm-elearn-yuwa.pdf');
  }catch(e){alert('PDF error: '+e.message)}finally{el.classList.remove('show')}
}

render();
