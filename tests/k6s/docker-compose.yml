services:
  # ===================== thaiphc2 =====================
  thaiphc2-test:
    build: .
    env_file: .env
    environment:
      - BASE_URL=${THAIPHC2_BASE_URL}
      - ORIGIN_HOST=${THAIPHC2_ORIGIN_HOST:-}
      - USERNAME=${THAIPHC2_USERNAME}
      - PASSWORD=${THAIPHC2_PASSWORD}
      - CLIENT_ID=${THAIPHC2_CLIENT_ID}
      - USER_TYPE=${THAIPHC2_USER_TYPE:-officer}
      - RESULT_MODE=${RESULT_MODE:-host}
    volumes:
      - ./results/thaiphc2:/results
    command: ["run", "/scripts/thaiphc2/test.js"]

  thaiphc2-smoke:
    build: .
    env_file: .env
    environment:
